<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymLog Pro - Análisis Evolutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        .trend-neutral { color: #94a3b8; }
        @keyframes alert-pulse {
            0% { background-color: #ffffff; }
            50% { background-color: #ef4444; color: white; }
            100% { background-color: #ffffff; }
        }
        .timer-alert { animation: alert-pulse 0.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40">

    <!-- Pantalla de Inicio / PIN -->
    <div id="lock-screen" class="fixed inset-0 z-[60] bg-slate-900 flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-black mb-8 tracking-tighter text-blue-500 italic">GYMLOG</h1>
        <div class="w-full max-w-xs space-y-4 text-center">
            <input type="password" id="app-password" pattern="[0-9]*" inputmode="numeric" placeholder="PIN" class="w-full p-4 rounded-3xl bg-slate-800 text-center text-2xl outline-none border border-slate-700 text-white focus:border-blue-500">
            <button onclick="checkPassword()" class="w-full bg-blue-600 p-4 rounded-3xl font-bold text-lg active:scale-95 transition-all">Acceder</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app" class="hidden">
        <header class="p-4 bg-white border-b sticky top-0 z-30 flex justify-between items-center glass">
            <div class="flex flex-col">
                <span id="header-date" class="text-[10px] font-black text-slate-400 uppercase">Hoy</span>
                <h2 class="text-xl font-black text-slate-800" id="current-title">Mis Rutinas</h2>
            </div>
            <button onclick="saveAllData()" class="bg-blue-600 text-white px-5 py-2 rounded-2xl text-xs font-black shadow-lg active:scale-95">GUARDAR</button>
        </header>

        <main class="p-4 max-w-md mx-auto space-y-6">
            
            <!-- VISTA: HOME -->
            <div id="view-home" class="tab-content active space-y-3">
                <div class="p-2 mb-2">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Selecciona tu sesión</h3>
                </div>
                <button onclick="openDay('push')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between border border-slate-200 active:bg-slate-50 transition-colors">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-xl">🔥</div><div><p class="text-[10px] font-bold text-blue-500 uppercase">Empuje</p><h3 class="font-black text-slate-800">Día 1: Push</h3></div></div>
                    <span class="text-slate-300">→</span>
                </button>
                <button onclick="openDay('legs')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between border border-slate-200 active:bg-slate-50 transition-colors">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center text-xl">🦵</div><div><p class="text-[10px] font-bold text-green-500 uppercase">Pierna</p><h3 class="font-black text-slate-800">Día 2: Legs</h3></div></div>
                    <span class="text-slate-300">→</span>
                </button>
                <button onclick="openDay('pull')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between border border-slate-200 active:bg-slate-50 transition-colors">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center text-xl">🦾</div><div><p class="text-[10px] font-bold text-red-500 uppercase">Tracción</p><h3 class="font-black text-slate-800">Día 3: Pull</h3></div></div>
                    <span class="text-slate-300">→</span>
                </button>
                <button onclick="openDay('cardio')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between border border-slate-200 active:bg-slate-50 transition-colors">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center text-xl">🏃</div><div><p class="text-[10px] font-bold text-orange-500 uppercase">Salud</p><h3 class="font-black text-slate-800">Día 4: Cardio</h3></div></div>
                    <span class="text-slate-300">→</span>
                </button>
            </div>

            <!-- VISTA: MÉTRICAS EVOLUTIVAS -->
            <div id="view-stats" class="tab-content space-y-6">
                <!-- Gráfico de Evolución Semanal -->
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Sobrecarga Progresiva (Volumen Semanal)</h3>
                    <canvas id="weeklyChart" class="w-full h-48"></canvas>
                </div>

                <!-- Resumen de Tendencias -->
                <div id="trend-analysis" class="bg-slate-800 text-white p-6 rounded-[2rem] shadow-xl space-y-3">
                    <h4 class="text-xs font-black text-blue-400 uppercase tracking-widest">Resumen de tendencia</h4>
                    <div id="trend-content" class="text-sm font-medium">Carga datos para analizar tu progreso...</div>
                </div>

                <!-- Historial con Tendencia por Ejercicio -->
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Historial de sesiones</h3>
                    <button onclick="exportToCSV()" class="text-blue-600 text-[10px] font-black underline uppercase">Exportar Excel</button>
                </div>
                <div id="history-list" class="space-y-4 pb-20"></div>
            </div>

            <!-- VISTA: ENTRENAMIENTO -->
            <div id="view-workout" class="tab-content space-y-6">
                <div id="exercise-list" class="space-y-6"></div>
                
                <!-- Añadir Extra -->
                <div class="bg-white/50 p-6 rounded-[2rem] border-2 border-dashed border-slate-300 flex flex-col items-center space-y-4">
                    <div class="text-center">
                        <p class="text-xs font-black text-slate-400 uppercase">Personalizar sesión</p>
                        <p class="text-[10px] text-slate-400">¿Quieres añadir un ejercicio más hoy?</p>
                    </div>
                    <div class="flex w-full space-x-2">
                        <select id="extra-ex-select" class="flex-1 p-3 bg-white rounded-xl text-sm font-bold border border-slate-200 outline-none">
                            <option value="">Elegir ejercicio...</option>
                            <option value="Aperturas Pecho">Aperturas Pecho</option>
                            <option value="Vuelos Posteriores">Vuelos Posteriores</option>
                            <option value="Extensiones Tríceps">Extensiones Tríceps</option>
                            <option value="Curl Martillo">Curl Martillo</option>
                            <option value="Prensa de Piernas">Prensa de Piernas</option>
                            <option value="Zancadas">Zancadas</option>
                            <option value="Core / Abs">Core / Abs</option>
                        </select>
                        <button onclick="addExtraExercise()" class="bg-slate-800 text-white px-4 rounded-xl font-black">+</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Barra de Navegación + Timer -->
        <nav class="fixed bottom-0 left-0 right-0 p-4 pb-10 glass z-40 border-t border-slate-200">
            <div class="max-w-md mx-auto space-y-4">
                <div id="timer-ui" class="bg-white rounded-2xl p-2 flex items-center justify-between shadow-sm border border-slate-100">
                    <div class="flex space-x-1 pl-1">
                        <button onclick="userStartTimer(60)" class="w-10 h-10 bg-slate-50 rounded-xl text-[10px] font-bold">60s</button>
                        <button onclick="userStartTimer(90)" class="w-10 h-10 bg-slate-50 rounded-xl text-[10px] font-bold">90s</button>
                    </div>
                    <div id="timer-display-box" onclick="toggleTimer()" class="flex-1 text-center cursor-pointer h-10 flex items-center justify-center font-mono text-xl font-black text-slate-800">00:00</div>
                    <button onclick="resetTimer()" class="w-10 h-10 text-red-500 bg-red-50 rounded-xl mr-1 font-bold">↺</button>
                </div>
                <div class="flex justify-around items-center px-8">
                    <button onclick="showTab('home')" class="flex flex-col items-center group">
                        <span class="text-2xl transition-transform group-active:scale-125">🏠</span>
                        <span class="text-[9px] font-black uppercase text-slate-500 mt-1 tracking-tighter">Rutinas</span>
                    </button>
                    <button onclick="showTab('stats')" class="flex flex-col items-center group">
                        <span class="text-2xl transition-transform group-active:scale-125">📈</span>
                        <span class="text-[9px] font-black uppercase text-slate-500 mt-1 tracking-tighter">Progreso</span>
                    </button>
                </div>
            </div>
        </nav>
    </div>

    <script>
        const PIN = "1234";
        let currentDay = '';
        let timerEndTimestamp = null;
        let timerInterval = null;
        let isTimerPaused = true;
        let remainingSeconds = 0;
        let audioCtx = null;
        let charts = {};
        let extraId = 1000;

        const baseExercises = {
            push: ["Press de Pecho", "Press Superior Hombro", "Elevaciones Laterales", "Extensión Tríceps Polea"],
            legs: ["Sentadilla Hack", "Extensión Cuádriceps", "Flexión Isquios", "Gemelo Elevación", "Peso Muerto"],
            pull: ["Dominadas", "Jalón al Pecho", "Remo a dos brazos", "Curl de Bíceps"],
            cardio: []
        };

        function checkPassword() {
            if(document.getElementById('app-password').value === PIN) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('header-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
                calculateMetrics();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            const titles = { 'home': 'Mis Rutinas', 'stats': 'Análisis Evolutivo', 'cardio': 'Sesión Cardio', 'workout': 'Entrenamiento' };
            document.getElementById('current-title').innerText = titles[tab] || 'Sesión';
            if(tab === 'stats') calculateMetrics();
        }

        function openDay(day) {
            currentDay = day;
            if(day === 'cardio') {
                document.getElementById('current-title').innerText = "Cardio";
                showTab('cardio');
                return;
            }
            const list = document.getElementById('exercise-list');
            list.innerHTML = '';
            baseExercises[day].forEach((ex, idx) => createExCard(ex, idx));
            showTab('workout');
        }

        function createExCard(name, id) {
            const list = document.getElementById('exercise-list');
            const div = document.createElement('div');
            div.className = "bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-4 ex-card";
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <h4 class="font-black text-slate-800 text-sm ex-name-label">${name}</h4>
                    <select onchange="renderSets(${id}, this.value)" class="text-[10px] font-black bg-blue-50 text-blue-600 rounded-full px-3 py-1 outline-none set-selector">
                        <option value="3">3 SERIES</option><option value="4">4 SERIES</option><option value="5">5 SERIES</option>
                    </select>
                </div>
                <div id="sets-container-${id}" class="space-y-2"></div>
            `;
            list.appendChild(div);
            renderSets(id, 3);
        }

        function renderSets(exId, num) {
            const container = document.getElementById(`sets-container-${exId}`);
            container.innerHTML = '';
            for(let i=1; i<=num; i++) {
                container.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <span class="text-[9px] font-black text-slate-300 w-4 italic">S${i}</span>
                        <input type="number" placeholder="Kg" class="w-full p-3 bg-slate-50 rounded-2xl text-center font-bold text-sm weight-input" data-ex="${exId}">
                        <input type="number" placeholder="Reps" class="w-full p-3 bg-slate-50 rounded-2xl text-center font-bold text-sm reps-input" data-ex="${exId}">
                    </div>
                `;
            }
        }

        function addExtraExercise() {
            const sel = document.getElementById('extra-ex-select');
            if(!sel.value) return;
            extraId++;
            createExCard(sel.value, extraId);
            sel.value = "";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function saveAllData() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            const session = {
                date: new Date().toLocaleDateString('es-ES'),
                fullDate: new Date().toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' }),
                timestamp: Date.now(),
                dayType: currentDay,
                exercises: [],
                totalVolume: 0
            };

            document.querySelectorAll('.ex-card').forEach(card => {
                const name = card.querySelector('.ex-name-label').innerText;
                const weights = card.querySelectorAll('.weight-input');
                const reps = card.querySelectorAll('.reps-input');
                let exVol = 0;
                let sets = [];
                weights.forEach((w, i) => {
                    const weight = parseFloat(w.value) || 0;
                    const rep = parseFloat(reps[i].value) || 0;
                    if(weight > 0 && rep > 0) {
                        exVol += (weight * rep);
                        sets.push({w: weight, r: rep});
                    }
                });
                if(exVol > 0) {
                    session.exercises.push({ name, volume: exVol, sets });
                    session.totalVolume += exVol;
                }
            });

            if(session.totalVolume > 0) {
                history.unshift(session);
                localStorage.setItem('gym_history', JSON.stringify(history.slice(0, 100)));
                alert("Sesión guardada. Analizando progreso...");
                showTab('stats');
            } else {
                alert("Introduce pesos y repeticiones para guardar.");
            }
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function calculateMetrics() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            const trendContent = document.getElementById('trend-content');
            const historyList = document.getElementById('history-list');
            
            if(!history.length) return;

            // Gráfico Semanal
            const weeklyVol = {};
            history.forEach(s => {
                const w = `Sem ${getWeekNumber(new Date(s.timestamp))}`;
                weeklyVol[w] = (weeklyVol[w] || 0) + s.totalVolume;
            });
            const weeks = Object.keys(weeklyVol).reverse();
            const volumes = weeks.map(w => weeklyVol[w]);

            if(charts.weekly) charts.weekly.destroy();
            charts.weekly = new Chart(document.getElementById('weeklyChart'), {
                type: 'line',
                data: {
                    labels: weeks,
                    datasets: [{
                        label: 'Kg Totales',
                        data: volumes,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 4, pointRadius: 6, pointBackgroundColor: '#fff'
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });

            // Lógica de Tendencia Ejercicio a Ejercicio
            historyList.innerHTML = '';
            history.forEach((session, sIdx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-4";
                
                let exHtml = '';
                session.exercises.forEach(ex => {
                    // Buscar la última vez que hizo ESTE ejercicio antes de esta sesión
                    const lastSameEx = history.slice(sIdx + 1).find(oldS => oldS.exercises.find(oldEx => oldEx.name === ex.name));
                    const oldExData = lastSameEx ? lastSameEx.exercises.find(o => o.name === ex.name) : null;
                    
                    let trendIcon = '↔';
                    let trendClass = 'trend-neutral';
                    if(oldExData) {
                        if(ex.volume > oldExData.volume) { trendIcon = '↑'; trendClass = 'trend-up'; }
                        else if(ex.volume < oldExData.volume) { trendIcon = '↓'; trendClass = 'trend-down'; }
                    }

                    exHtml += `
                        <div class="flex justify-between items-center py-1 border-b border-slate-50 last:border-0">
                            <span class="text-xs font-bold text-slate-600">${ex.name}</span>
                            <div class="text-right flex items-center space-x-2">
                                <span class="text-[10px] font-black text-slate-400">${ex.volume}kg</span>
                                <span class="text-sm font-black ${trendClass}">${trendIcon}</span>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-start border-b border-slate-100 pb-3 mb-2">
                        <div>
                            <p class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${session.dayType} - ${session.fullDate}</p>
                            <h4 class="font-black text-slate-800">Sesión #${history.length - sIdx}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-300 uppercase">Volumen Total</p>
                            <p class="text-lg font-black text-slate-800 leading-none">${session.totalVolume} <small class="text-[10px]">kg</small></p>
                        </div>
                    </div>
                    <div class="space-y-1">${exHtml}</div>
                `;
                historyList.appendChild(card);
            });

            // Resumen de tendencia general
            if(history.length >= 2) {
                const current = history[0].totalVolume;
                const prev = history[1].totalVolume;
                const diff = (((current - prev) / prev) * 100).toFixed(1);
                trendContent.innerHTML = `Tu última sesión de <span class="text-blue-400">${history[0].dayType}</span> tuvo un <span class="${diff >= 0 ? 'text-green-400' : 'text-red-400'}">${diff >= 0 ? 'aumento' : 'descenso'} del ${Math.abs(diff)}%</span> en volumen de carga respecto a la anterior.`;
            }
        }

        function exportToCSV() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            let csv = "Fecha,Rutina,Ejercicio,Peso_Medio,Reps_Totales,Volumen_Ejercicio\n";
            history.forEach(s => {
                s.exercises.forEach(ex => {
                    const avgW = (ex.sets.reduce((a,b)=>a+b.w,0)/ex.sets.length).toFixed(1);
                    const totalR = ex.sets.reduce((a,b)=>a+b.r,0);
                    csv += `${s.date},${s.dayType},"${ex.name}",${avgW},${totalR},${ex.volume}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `GymLog_Historial.csv`; a.click();
        }

        // --- TIMER ---
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function userStartTimer(secs) { initAudio(); remainingSeconds = secs; startTimer(); }
        function startTimer() {
            clearInterval(timerInterval);
            timerEndTimestamp = Date.now() + (remainingSeconds * 1000);
            isTimerPaused = false;
            document.getElementById('timer-display-box').classList.remove('timer-alert');
            timerInterval = setInterval(() => {
                const diff = timerEndTimestamp - Date.now();
                if(diff <= 0) { clearInterval(timerInterval); triggerAlert(); remainingSeconds = 0; } 
                else { remainingSeconds = Math.ceil(diff/1000); }
                const m = Math.floor(remainingSeconds/60);
                const s = remainingSeconds%60;
                document.getElementById('timer-display-box').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 250);
        }
        function toggleTimer() { initAudio(); isTimerPaused ? startTimer() : (clearInterval(timerInterval), isTimerPaused = true); }
        function resetTimer() { clearInterval(timerInterval); remainingSeconds = 0; document.getElementById('timer-display-box').innerText = "00:00"; document.getElementById('timer-display-box').classList.remove('timer-alert'); }
        function triggerAlert() {
            document.getElementById('timer-display-box').classList.add('timer-alert');
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            if(audioCtx) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = "square"; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }
    </script>
</body>
</html>

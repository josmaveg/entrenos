<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymLog Analytics & Hypertrophy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes alert-pulse {
            0% { background-color: #ffffff; }
            50% { background-color: #ef4444; color: white; }
            100% { background-color: #ffffff; }
        }
        .timer-alert { animation: alert-pulse 0.5s infinite; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-32">

    <!-- Bloqueo -->
    <div id="lock-screen" class="fixed inset-0 z-[60] bg-slate-900 flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-black mb-8">GYM<span class="text-blue-500">LOG</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="password" id="app-password" pattern="[0-9]*" inputmode="numeric" placeholder="PIN" class="w-full p-4 rounded-2xl bg-slate-800 text-center text-2xl outline-none border border-slate-700">
            <button onclick="checkPassword()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-lg active:scale-95 transition-all">Entrar</button>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
        <header class="p-4 bg-white border-b sticky top-0 z-30 flex justify-between items-center glass">
            <h2 class="text-xl font-black text-slate-800" id="current-title">Mis Rutinas</h2>
            <button onclick="saveAllData()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg">Guardar</button>
        </header>

        <main class="p-4 max-w-md mx-auto space-y-6">
            
            <!-- VISTA: HOME (RUTINAS) -->
            <div id="view-home" class="tab-content active space-y-3">
                <button onclick="openDay('push')" class="w-full bg-white p-5 rounded-3xl shadow-sm flex items-center justify-between border border-slate-200">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-xl">🔥</div><div><p class="text-[10px] font-bold text-blue-500 uppercase">Push</p><h3 class="font-bold">Pecho, Hombro, Tríceps</h3></div></div>
                    <span>→</span>
                </button>
                <button onclick="openDay('legs')" class="w-full bg-white p-5 rounded-3xl shadow-sm flex items-center justify-between border border-slate-200">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center text-xl">🦵</div><div><p class="text-[10px] font-bold text-green-500 uppercase">Legs</p><h3 class="font-bold">Pierna Completa</h3></div></div>
                    <span>→</span>
                </button>
                <button onclick="openDay('pull')" class="w-full bg-white p-5 rounded-3xl shadow-sm flex items-center justify-between border border-slate-200">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center text-xl">🦾</div><div><p class="text-[10px] font-bold text-red-500 uppercase">Pull</p><h3 class="font-bold">Espalda, Bíceps</h3></div></div>
                    <span>→</span>
                </button>
                <button onclick="openDay('free')" class="w-full bg-white p-5 rounded-3xl shadow-sm flex items-center justify-between border border-slate-200">
                    <div class="flex items-center space-x-4"><div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-xl">✨</div><div><p class="text-[10px] font-bold text-purple-500 uppercase">Free</p><h3 class="font-bold">Personalizado</h3></div></div>
                    <span>→</span>
                </button>
            </div>

            <!-- VISTA: MÉTRICAS SEMANALES -->
            <div id="view-stats" class="tab-content space-y-6">
                <!-- Gráfico de Evolución Semanal -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-tighter">Volumen Semanal (Sobrecarga)</h3>
                    <canvas id="weeklyChart" class="w-full h-48"></canvas>
                </div>

                <!-- Resumen de Hipertrofia -->
                <div id="hipertrofia-alert" class="p-4 rounded-2xl border flex flex-col items-center text-center space-y-1">
                    <!-- Dinámico -->
                </div>

                <!-- Botón Exportar -->
                <button onclick="exportToCSV()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold flex items-center justify-center space-x-2">
                    <span>📊</span><span>Exportar Excel (.csv)</span>
                </button>

                <!-- Historial con mini-gráficos -->
                <div id="history-list" class="space-y-4"></div>
            </div>

            <!-- VISTA: ENTRENAMIENTO -->
            <div id="view-workout" class="tab-content">
                <div id="exercise-list" class="space-y-6"></div>
            </div>

        </main>

        <!-- Navegación y Timer -->
        <nav class="fixed bottom-0 left-0 right-0 p-4 pb-8 glass z-40 border-t">
            <div class="max-w-md mx-auto space-y-4">
                <div id="timer-ui" class="bg-white rounded-2xl p-2 flex items-center justify-between shadow-sm border">
                    <div class="flex space-x-1 pl-1">
                        <button onclick="userStartTimer(60)" class="w-10 h-10 bg-slate-100 rounded-xl text-[10px] font-bold">60s</button>
                        <button onclick="userStartTimer(90)" class="w-10 h-10 bg-slate-100 rounded-xl text-[10px] font-bold">90s</button>
                        <button onclick="userStartTimer(120)" class="w-10 h-10 bg-slate-100 rounded-xl text-[10px] font-bold">120s</button>
                    </div>
                    <div id="timer-display-box" onclick="toggleTimer()" class="flex-1 text-center cursor-pointer h-10 flex items-center justify-center font-mono text-xl font-black">00:00</div>
                    <button onclick="resetTimer()" class="w-10 h-10 text-red-500 bg-red-50 rounded-xl mr-1 font-bold">↺</button>
                </div>
                <div class="flex justify-around items-center">
                    <button onclick="showTab('home')" class="flex flex-col items-center"><span class="text-2xl">📋</span><span class="text-[9px] font-black uppercase text-slate-500">Rutinas</span></button>
                    <button onclick="showTab('stats')" class="flex flex-col items-center"><span class="text-2xl">📉</span><span class="text-[9px] font-black uppercase text-slate-500">Métricas</span></button>
                </div>
            </div>
        </nav>
    </div>

    <script>
        const PIN = "1234";
        let currentDay = '';
        let timerEndTimestamp = null;
        let timerInterval = null;
        let isTimerPaused = true;
        let remainingSeconds = 0;
        let audioCtx = null;
        let charts = {};

        const exercisesDB = ["Press de Pecho", "Sentadilla", "Peso Muerto", "Dominadas", "Press Militar", "Curl Bíceps", "Elevaciones Laterales", "Zancadas"];

        function checkPassword() {
            if(document.getElementById('app-password').value === PIN) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                calculateMetrics();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            if(tab === 'stats') calculateMetrics();
        }

        function openDay(day) {
            currentDay = day;
            const list = document.getElementById('exercise-list');
            list.innerHTML = '';
            const workouts = {
                push: ["Press de Pecho", "Press Superior", "Elevaciones Laterales", "Extensión Tríceps"],
                legs: ["Sentadilla Hack", "Extensión Cuádriceps", "Flexión Isquios", "Prensa"],
                pull: ["Dominadas", "Remo en Polea", "Jalón al Pecho", "Curl de Bíceps"],
                free: ["LIBRE", "LIBRE", "LIBRE", "LIBRE"]
            };

            workouts[day].forEach((ex, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl border border-slate-200 space-y-4";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        ${ex === 'LIBRE' ? `<select class="ex-name font-bold bg-slate-50 p-1 rounded-lg text-sm">${exercisesDB.map(e => `<option value="${e}">${e}</option>`).join('')}</select>` : `<h4 class="font-bold ex-name">${ex}</h4>`}
                        <select onchange="renderSets(${idx}, this.value)" id="sets-${idx}" class="text-[10px] font-black bg-blue-50 text-blue-600 rounded-full px-3 py-1 outline-none">
                            <option value="3">3 SERIES</option><option value="4">4 SERIES</option><option value="5">5 SERIES</option>
                        </select>
                    </div>
                    <div id="container-${idx}" class="space-y-2"></div>
                `;
                list.appendChild(div);
                renderSets(idx, 3);
            });
            showTab('workout');
        }

        function renderSets(exIdx, num) {
            const container = document.getElementById(`container-${exIdx}`);
            container.innerHTML = '';
            for(let i=1; i<=num; i++) {
                container.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <span class="text-[9px] font-bold text-slate-300 w-4">S${i}</span>
                        <input type="number" placeholder="Kg" class="w-full p-2 bg-slate-50 rounded-xl text-center font-bold text-sm weight-input" data-ex="${exIdx}">
                        <input type="number" placeholder="Reps" class="w-full p-2 bg-slate-50 rounded-xl text-center font-bold text-sm reps-input" data-ex="${exIdx}">
                    </div>
                `;
            }
        }

        function saveAllData() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            const session = {
                date: new Date().toLocaleDateString('es-ES'),
                timestamp: Date.now(),
                day: currentDay,
                exercises: [],
                totalVolume: 0
            };

            document.querySelectorAll('#exercise-list > div').forEach((card, idx) => {
                const name = card.querySelector('.ex-name').value || card.querySelector('.ex-name').innerText;
                const weights = card.querySelectorAll('.weight-input');
                const reps = card.querySelectorAll('.reps-input');
                let exVol = 0;
                let setsData = [];
                weights.forEach((w, i) => {
                    const weight = parseFloat(w.value) || 0;
                    const rep = parseFloat(reps[i].value) || 0;
                    exVol += weight * rep;
                    setsData.push({w: weight, r: rep});
                });
                if(exVol > 0) {
                    session.exercises.push({name, volume: exVol, sets: setsData});
                    session.totalVolume += exVol;
                }
            });

            if(session.totalVolume > 0) {
                history.unshift(session);
                localStorage.setItem('gym_history', JSON.stringify(history.slice(0, 50)));
                alert("Entrenamiento guardado.");
                showTab('stats');
            }
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function calculateMetrics() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            const weeklyData = {};
            
            // Agrupar por semana
            history.forEach(session => {
                const date = new Date(session.timestamp);
                const week = `Sem ${getWeekNumber(date)}`;
                weeklyData[week] = (weeklyData[week] || 0) + session.totalVolume;
            });

            // Actualizar Gráfico Principal
            const weeks = Object.keys(weeklyData).reverse();
            const volumes = weeks.map(w => weeklyData[w]);

            if(charts.weekly) charts.weekly.destroy();
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            charts.weekly = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: weeks,
                    datasets: [{
                        label: 'Volumen Kg',
                        data: volumes,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });

            // Alerta de Hipertrofia
            const alertBox = document.getElementById('hipertrofia-alert');
            if(volumes.length >= 2) {
                const current = volumes[volumes.length-1];
                const prev = volumes[volumes.length-2];
                const diff = (((current - prev) / prev) * 100).toFixed(1);
                const isPos = diff >= 0;
                alertBox.className = `p-4 rounded-3xl border flex flex-col items-center text-center space-y-1 ${isPos ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`;
                alertBox.innerHTML = `
                    <span class="text-[10px] font-black uppercase text-slate-400">Progreso Semanal</span>
                    <h4 class="text-2xl font-black ${isPos ? 'text-green-600' : 'text-red-600'}">${isPos ? '↑' : '↓'} ${Math.abs(diff)}%</h4>
                    <p class="text-xs font-bold text-slate-600">${isPos ? '¡Sobrecarga aplicada! Sigues creciendo.' : 'Baja de volumen. Revisa descansos o cargas.'}</p>
                `;
            }

            // Historial con Gráficos por Sesión
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            history.forEach((session, sIdx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl border border-slate-200 shadow-sm space-y-3";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div><p class="text-[9px] font-black text-blue-500 uppercase">${session.day}</p><h4 class="font-bold text-sm">${session.date}</h4></div>
                        <div class="text-right"><p class="text-[9px] font-bold text-slate-300">TOTAL</p><p class="text-lg font-black">${session.totalVolume} kg</p></div>
                    </div>
                    <canvas id="sessionChart-${sIdx}" class="w-full h-32"></canvas>
                `;
                historyList.appendChild(div);

                setTimeout(() => {
                    const sCtx = document.getElementById(`sessionChart-${sIdx}`).getContext('2d');
                    new Chart(sCtx, {
                        type: 'bar',
                        data: {
                            labels: session.exercises.map(e => e.name.substring(0, 10)),
                            datasets: [{
                                data: session.exercises.map(e => e.volume),
                                backgroundColor: '#3b82f6',
                                borderRadius: 8
                            }]
                        },
                        options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
                    });
                }, 100);
            });
        }

        function exportToCSV() {
            const history = JSON.parse(localStorage.getItem('gym_history') || '[]');
            let csv = "Fecha,Rutina,Ejercicio,Volumen_Total\n";
            history.forEach(s => { s.exercises.forEach(e => { csv += `${s.date},${s.day},${e.name},${e.volume}\n`; }); });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `entrenos_gymlog.csv`;
            a.click();
        }

        // --- TIMER REFORZADO ---
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function userStartTimer(secs) { initAudio(); remainingSeconds = secs; startTimer(); }
        function startTimer() {
            clearInterval(timerInterval);
            timerEndTimestamp = Date.now() + (remainingSeconds * 1000);
            isTimerPaused = false;
            document.getElementById('timer-display-box').classList.remove('timer-alert');
            timerInterval = setInterval(() => {
                const diff = timerEndTimestamp - Date.now();
                if(diff <= 0) { 
                    clearInterval(timerInterval); 
                    triggerAlert(); 
                    remainingSeconds = 0; 
                } else { 
                    remainingSeconds = Math.ceil(diff/1000); 
                }
                const m = Math.floor(remainingSeconds/60);
                const s = remainingSeconds%60;
                document.getElementById('timer-display-box').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 200);
        }
        function toggleTimer() { initAudio(); isTimerPaused ? startTimer() : (clearInterval(timerInterval), isTimerPaused = true); }
        function resetTimer() { clearInterval(timerInterval); remainingSeconds = 0; document.getElementById('timer-display-box').innerText = "00:00"; document.getElementById('timer-display-box').classList.remove('timer-alert'); }
        function triggerAlert() {
            document.getElementById('timer-display-box').classList.add('timer-alert');
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            if(audioCtx) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = "square"; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }
    </script>
</body>
</html>
